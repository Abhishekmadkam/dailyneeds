<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>C Language · CodeVibeLabs — Complete Course</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-black: #0b0e14;
            --color-white: #ffffff;
            --color-off-white: #f8fafc;
            --color-gray-50: #f1f4f9;
            --color-gray-100: #eaeef3;
            --color-gray-200: #dce2ea;
            --color-gray-300: #d0d5dd;
            --color-gray-400: #b0b8c5;
            --color-gray-500: #8f9bb0;
            --color-gray-600: #6b7280;
            --color-gray-700: #4a4f5e;
            --color-gray-800: #2d3548;
            --color-gray-900: #1a212f;
            --color-accent: #2d7d46;
            --color-accent-light: #3a9d5a;
            --color-accent-dark: #1e5a32;
            --color-code-bg: #0f141e;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 48px -12px rgba(0, 0, 0, 0.10);
            --shadow-xl: 0 30px 60px -16px rgba(0, 0, 0, 0.14);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--color-off-white);
            color: var(--color-black);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--color-black);
            color: var(--color-gray-300);
            overflow-y: auto;
            padding: 1.2rem 0 2rem;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: var(--color-gray-900);
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--color-accent);
            border-radius: 10px;
        }

        .sidebar-brand {
            padding: 0 1.2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 0.8rem;
        }

        .sidebar-brand .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--color-white);
            font-family: 'Space Grotesk', sans-serif;
        }

        .sidebar-brand .logo i {
            color: var(--color-accent-light);
            font-size: 1.4rem;
        }

        .sidebar-brand .sub {
            font-size: 0.65rem;
            color: var(--color-gray-500);
            margin-top: 0.2rem;
            padding-left: 2.2rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0 0.6rem;
        }

        .sidebar-nav .nav-section {
            margin-bottom: 0.4rem;
        }

        .sidebar-nav .nav-section-title {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--color-gray-500);
            padding: 0.6rem 0.6rem 0.3rem;
            font-weight: 700;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
            font-size: 0.78rem;
            color: var(--color-gray-400);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-nav .nav-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--color-white);
        }

        .sidebar-nav .nav-item.active {
            background: rgba(45, 125, 70, 0.2);
            color: var(--color-accent-light);
            border-left: 3px solid var(--color-accent);
        }

        .sidebar-nav .nav-item i {
            font-size: 0.7rem;
            width: 1.2rem;
            color: var(--color-gray-500);
        }

        .sidebar-nav .nav-item.active i {
            color: var(--color-accent-light);
        }

        .sidebar-footer {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.6rem;
            color: var(--color-gray-500);
        }

        .sidebar-footer .powered {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .sidebar-footer .powered i {
            color: var(--color-accent-light);
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 0.8rem;
            left: 0.8rem;
            z-index: 1001;
            background: var(--color-black);
            color: var(--color-white);
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 1.5rem 2rem 3rem;
            min-height: 100vh;
            max-width: calc(100% - var(--sidebar-width));
        }

        .topic-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--color-gray-200);
        }

        .topic-header h1 {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--color-black);
        }

        .topic-header .topic-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.8rem;
            color: var(--color-gray-600);
        }

        .topic-header .topic-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .topic-body {
            max-width: 1000px;
        }

        .topic-body .description {
            font-size: 1.05rem;
            color: var(--color-gray-700);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .topic-body .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 1.5rem 0 0.8rem;
            color: var(--color-black);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .topic-body .section-title i {
            color: var(--color-accent);
            font-size: 1.1rem;
        }

        .topic-body .code-block {
            background: var(--color-code-bg);
            border-radius: var(--radius-sm);
            padding: 1.2rem 1.5rem;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.9;
            overflow-x: auto;
            margin: 0.8rem 0;
            border: 1px solid var(--color-gray-800);
        }

        .code-block .comment {
            color: #6a9955;
        }
        .code-block .keyword {
            color: #569cd6;
        }
        .code-block .string {
            color: #ce9178;
        }
        .code-block .func {
            color: #dcdcaa;
        }
        .code-block .var {
            color: #9cdcfe;
        }
        .code-block .num {
            color: #b5cea8;
        }
        .code-block .preprocessor {
            color: #c586c0;
        }

        .topic-body .output-block {
            background: var(--color-gray-900);
            border-radius: var(--radius-sm);
            padding: 0.8rem 1.2rem;
            color: #b0b8c5;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            margin: 0.5rem 0 1rem;
            border-left: 3px solid var(--color-accent);
        }

        .topic-body .example-box {
            background: var(--color-white);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
            margin: 1rem 0;
            border: 1px solid var(--color-gray-200);
            box-shadow: var(--shadow-sm);
        }

        .example-box .ex-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--color-black);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .example-box .ex-title i {
            color: var(--color-accent);
        }

        .example-box .ex-desc {
            font-size: 0.9rem;
            color: var(--color-gray-600);
            margin-bottom: 0.5rem;
        }

        .topic-body .practice-box {
            background: var(--color-white);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
            margin: 1.5rem 0;
            border: 2px dashed var(--color-accent);
            box-shadow: var(--shadow-sm);
        }

        .practice-box h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .practice-box h3 i {
            color: var(--color-accent);
        }

        .practice-box .challenge-desc {
            color: var(--color-gray-600);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .practice-box .btn-practice {
            background: var(--color-accent);
            color: var(--color-white);
            border: none;
            padding: 0.4rem 1.4rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-fast);
            margin-right: 0.5rem;
        }

        .practice-box .btn-practice:hover {
            background: var(--color-accent-light);
            transform: translateY(-2px);
        }

        .practice-box .btn-hint {
            background: var(--color-gray-200);
            color: var(--color-gray-700);
            border: none;
            padding: 0.4rem 1.4rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .practice-box .btn-hint:hover {
            background: var(--color-gray-300);
        }

        .topic-body .nav-links {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-gray-200);
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .topic-body .nav-links .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--color-gray-600);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition-fast);
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-sm);
        }

        .topic-body .nav-links .nav-link:hover {
            color: var(--color-black);
            background: var(--color-gray-50);
        }

        .topic-body .nav-links .nav-link i {
            font-size: 0.8rem;
        }

        .game-box {
            background: linear-gradient(135deg, var(--color-black), var(--color-gray-900));
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            margin: 1.5rem 0;
            color: var(--color-white);
            position: relative;
            overflow: hidden;
        }

        .game-box::before {
            content: '🎮';
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 5rem;
            opacity: 0.1;
        }

        .game-box .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .game-box .game-title i {
            color: var(--color-accent-light);
        }

        .game-box .game-desc {
            color: var(--color-gray-400);
            font-size: 0.9rem;
            margin: 0.3rem 0 0.8rem;
        }

        .game-box .btn-game {
            background: var(--color-accent);
            color: var(--color-white);
            border: none;
            padding: 0.4rem 1.8rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .game-box .btn-game:hover {
            background: var(--color-accent-light);
            transform: translateY(-2px);
        }

        .game-box .game-score {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: var(--color-gray-500);
        }

        .game-box .game-score span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .game-box .game-score .score-num {
            color: var(--color-white);
            font-weight: 700;
            font-size: 1rem;
        }

        /* ----- COMPILER STYLES ----- */
        .compiler-section {
            background: #1a1a2e;
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid #2d2d44;
            box-shadow: var(--shadow-md);
        }

        .compiler-section .compiler-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #c0c0d0;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .compiler-section .compiler-header i {
            color: var(--color-accent-light);
        }

        .compiler-section textarea {
            width: 100%;
            background: #0d0d1a;
            color: #e0e0f0;
            border: 1px solid #2d2d44;
            border-radius: var(--radius-sm);
            padding: 0.8rem 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
            resize: vertical;
            min-height: 160px;
            outline: none;
            transition: border 0.2s;
        }

        .compiler-section textarea:focus {
            border-color: var(--color-accent);
        }

        .compiler-section .compiler-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0.8rem 0;
        }

        .compiler-section .btn-run {
            background: var(--color-accent);
            color: white;
            border: none;
            padding: 0.4rem 1.8rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .compiler-section .btn-run:hover {
            background: var(--color-accent-light);
            transform: translateY(-2px);
        }

        .compiler-section .btn-clear {
            background: #3d3d5c;
            color: #ccc;
            border: none;
            padding: 0.4rem 1.4rem;
            border-radius: var(--radius-full);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .compiler-section .btn-clear:hover {
            background: #4d4d6c;
        }

        .compiler-section .output-console {
            background: #0d0d1a;
            color: #b0b8c5;
            border-radius: var(--radius-sm);
            padding: 0.8rem 1.2rem;
            margin-top: 0.8rem;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            min-height: 50px;
            border: 1px solid #2d2d44;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--color-black);
            color: var(--color-white);
            padding: 0.5rem 1.5rem;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: var(--shadow-xl);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 9999;
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            max-width: 90%;
        }

        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-toggle {
                display: block;
            }
            .sidebar-overlay.active {
                display: block;
            }
            .main-content {
                margin-left: 0;
                max-width: 100%;
                padding: 1.2rem 1.2rem 2rem;
                padding-top: 4rem;
            }
            .topic-header h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 600px) {
            .topic-body .code-block {
                font-size: 0.7rem;
                padding: 0.8rem 1rem;
            }
            .topic-header h1 {
                font-size: 1.3rem;
            }
            .topic-body .description {
                font-size: 0.9rem;
            }
            .practice-box {
                padding: 1rem;
            }
            .practice-box .btn-practice,
            .practice-box .btn-hint {
                font-size: 0.7rem;
                padding: 0.3rem 1rem;
            }
            .game-box {
                padding: 1rem 1.2rem;
            }
            .game-box .game-title {
                font-size: 1rem;
            }
            .example-box {
                padding: 0.8rem 1rem;
            }
            .compiler-section {
                padding: 0.8rem 1rem;
            }
            .compiler-section textarea {
                font-size: 0.75rem;
                min-height: 120px;
            }
        }

        ::selection {
            background: var(--color-accent);
            color: var(--color-white);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-gray-50);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-accent);
        }
    </style>
</head>
<body>

    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>C · Course</span>
            </div>
            <div class="sub">Complete C Programming Syllabus</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <div class="powered">
                <i class="fas fa-bolt"></i> powered by <strong style="color:var(--color-white);">teamorbits</strong>
            </div>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <div style="padding:2rem;text-align:center;color:var(--color-gray-600);">
            <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--color-accent);"></i>
            <p style="margin-top:1rem;">Loading course content...</p>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        (function() {

                'Functions': [

                'Structures': [

            // ----- BUILD SIDEBAR -----
            function buildSidebar() {
                const nav = document.getElementById('sidebarNav');
                nav.innerHTML = '';
                let firstTopicId = null;

                for (const [section, topics] of Object.entries(syllabusData)) {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'nav-section';

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'nav-section-title';
                    titleDiv.textContent = section;
                    sectionDiv.appendChild(titleDiv);

                    topics.forEach(topic => {
                        const link = document.createElement('button');
                        link.className = 'nav-item';
                        link.dataset.topicId = topic.id;
                        link.innerHTML = `<i class="fas fa-chevron-right"></i> ${topic.label}`;

                        if (!firstTopicId) firstTopicId = topic.id;
                        if (topic.id === 'c-home') link.classList.add('active');

                        link.addEventListener('click', function(e) {
                            e.preventDefault();
                            loadTopic(topic.id);
                            if (window.innerWidth <= 1024) closeSidebar();
                        });

                        sectionDiv.appendChild(link);
                    });

                    nav.appendChild(sectionDiv);
                }

                return firstTopicId;
            }

            // ----- LOAD TOPIC (with integrated compiler) -----
            function loadTopic(topicId) {
                const content = topicContent[topicId];
                if (!content) {
                    showToast('Topic not found. Loading default...');
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.topicId === topicId) item.classList.add('active');
                });

                const main = document.getElementById('mainContent');

                // Build the compiler code from the topic's code or a default
                const defaultCode = content.code || '#include <stdio.h>\n\nint main() {\n    printf("Hello, C!\\n");\n    return 0;\n}';

                let html = `
                    <div class="topic-header">
                        <h1>${content.title}</h1>
                        <div class="topic-meta">
                            <span><i class="fas fa-clock"></i> 5 min read</span>
                            <span><i class="fas fa-code"></i> ${content.practice ? 'Practice included' : 'Reference'}</span>
                            <span><i class="fas fa-gamepad"></i> Interactive</span>
                        </div>
                    </div>
                    <div class="topic-body">
                        <div class="description">${content.description}</div>
                `;

                if (content.sections) {
                    content.sections.forEach(section => {
                        html += `
                            <div class="section-title"><i class="fas fa-book"></i> ${section.title}</div>
                            <div class="description">${section.content}</div>
                        `;
                    });
                }

                if (content.code) {
                    html += `<div class="code-block">${content.code}</div>`;
                }

                if (content.output) {
                    html += `<div class="output-block">▶ Output: ${content.output}</div>`;
                }

                if (content.examples) {
                    content.examples.forEach(ex => {
                        html += `
                            <div class="example-box">
                                <div class="ex-title"><i class="fas fa-lightbulb"></i> ${ex.title}</div>
                                <div class="ex-desc">${ex.desc}</div>
                                <div class="code-block">${ex.code}</div>
                            </div>
                        `;
                    });
                }

                if (content.practice) {
                    html += `
                        <div class="practice-box">
                            <h3><i class="fas fa-gamepad"></i> Practice Challenge</h3>
                            <p class="challenge-desc">${content.practice.challenge}</p>
                            <button class="btn-practice" onclick="startChallenge('${topicId}')">Start Practice</button>
                            <button class="btn-hint" onclick="showHint('${topicId}')">Hint</button>
                        </div>
                    `;
                }

                // ----- COMPILER SECTION (integrated) -----
                html += `
                    <div class="compiler-section">
                        <div class="compiler-header">
                            <i class="fas fa-terminal"></i> <span>C Playground · Online Compiler</span>
                        </div>
                        <textarea id="codeEditor_${topicId}" spellcheck="false">${defaultCode}</textarea>
                        <div class="compiler-actions">
                            <button class="btn-run" onclick="runCode('${topicId}')"><i class="fas fa-play"></i> Run</button>
                            <button class="btn-clear" onclick="clearOutput('${topicId}')">Clear</button>
                        </div>
                        <div class="output-console" id="outputConsole_${topicId}">// Output will appear here</div>
                    </div>
                `;

                // Game box (gamification)
                html += `
                    <div class="game-box">
                        <div class="game-title"><i class="fas fa-trophy"></i> CodeQuest: ${content.title}</div>
                        <div class="game-desc">Complete the challenge to earn points! Practice makes perfect.</div>
                        <button class="btn-game" onclick="showToast('🎮 Level started! Complete all tasks.')">Start Quest</button>
                        <div class="game-score">
                            <span>⭐ <span class="score-num" id="xpDisplay">0</span> XP</span>
                            <span>🏆 <span class="score-num" id="questDisplay">0</span> / 10</span>
                        </div>
                    </div>
                `;

                const allTopics = [];
                for (const [section, topics] of Object.entries(syllabusData)) {
                    topics.forEach(t => allTopics.push(t.id));
                }
                const currentIndex = allTopics.indexOf(topicId);
                const prevTopic = currentIndex > 0 ? allTopics[currentIndex - 1] : null;
                const nextTopic = currentIndex < allTopics.length - 1 ? allTopics[currentIndex + 1] : null;

                html += `
                    <div class="nav-links">
                        ${prevTopic ? `<span class="nav-link" onclick="loadTopic('${prevTopic}')"><i class="fas fa-arrow-left"></i> ${topicContent[prevTopic]?.title || 'Previous'}</span>` : '<span></span>'}
                        ${nextTopic ? `<span class="nav-link" onclick="loadTopic('${nextTopic}')">${topicContent[nextTopic]?.title || 'Next'} <i class="fas fa-arrow-right"></i></span>` : '<span></span>'}
                    </div>
                </div>
                `;

                main.innerHTML = html;
                history.pushState(null, '', `#${topicId}`);
                showToast(`📖 ${content.title} · loaded`);
            }

            // ----- COMPILER ENGINE (mock C interpreter) -----
            window.runCode = function(topicId) {
                const code = document.getElementById(`codeEditor_${topicId}`).value;
                const outputEl = document.getElementById(`outputConsole_${topicId}`);
                outputEl.textContent = '⏳ Compiling...';

                // Simulated C compiler: extracts printf strings and basic arithmetic
                try {
                    let result = '';
                    const lines = code.split('\n');
                    for (let line of lines) {
                        // Match printf("...")
                        const match = line.match(/printf\s*\(\s*"([^"]*)"\s*\)/);
                        if (match) {
                            result += match[1] + '\n';
                        }
                        // Match printf with format specifiers (basic)
                        const matchF = line.match(/printf\s*\(\s*"([^"]*%[^"]*)"\s*,\s*(.*?)\s*\)/);
                        if (matchF) {
                            let fmt = matchF[1];
                            const args = matchF[2].split(',').map(s => s.trim());
                            // simplistic: replace %d with first arg
                            let out = fmt;
                            for (let arg of args) {
                                const num = parseInt(arg);
                                if (!isNaN(num)) {
                                    out = out.replace(/%d/, num);
                                } else {
                                    out = out.replace(/%d/, arg);
                                }
                            }
                            result += out + '\n';
                        }
                    }
                    if (result === '') {
                        // if no printf, show a message
                        result = '// (mock) No printf output. Try adding printf("Hello");';
                    }
                    outputEl.textContent = result;
                    showToast('✅ Code executed successfully!');
                } catch (e) {
                    outputEl.textContent = '⚠️ Error: ' + e.message;
                    showToast('❌ Compilation error');
                }
            };

            window.clearOutput = function(topicId) {
                document.getElementById(`outputConsole_${topicId}`).textContent = '// Output cleared';
            };

            // ----- GLOBAL FUNCTIONS -----
            window.loadTopic = loadTopic;

            window.startChallenge = function(topicId) {
                const content = topicContent[topicId];
                if (content && content.practice) {
                    showToast(`🎯 Challenge started: ${content.practice.challenge}`);
                }
            };

            window.showHint = function(topicId) {
                const content = topicContent[topicId];
                if (content && content.practice) {
                    showToast(`💡 Hint: ${content.practice.hint}`);
                }
            };

            // ----- TOAST -----
            const toastEl = document.getElementById('toast');
            let toastTimer = null;

            function showToast(message, duration = 2800) {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.style.opacity = '1';
                toastEl.style.transform = 'translateX(-50%) translateY(0)';
                toastTimer = setTimeout(() => {
                    toastEl.style.opacity = '0';
                    toastEl.style.transform = 'translateX(-50%) translateY(20px)';
                }, duration);
            }
            window.showToast = showToast;

            // ----- SIDEBAR TOGGLE -----
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            function openSidebar() {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            sidebarToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
            });

            sidebarOverlay.addEventListener('click', closeSidebar);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeSidebar();
                    if (toastEl.style.opacity === '1') {
                        toastEl.style.opacity = '0';
                        toastEl.style.transform = 'translateX(-50%) translateY(20px)';
                    }
                }
            });

            // ----- INIT -----
            const firstTopic = buildSidebar();
            const hash = window.location.hash.replace('#', '');
            const defaultTopic = hash && topicContent[hash] ? hash : (firstTopic || 'c-home');
            loadTopic(defaultTopic);

            window.addEventListener('hashchange', function() {
                const newHash = window.location.hash.replace('#', '');
                if (newHash && topicContent[newHash]) loadTopic(newHash);
            });

            console.log('%c 🚀 C Language · Complete Course ', 'background: #2d7d46; color: #ffffff; font-size: 16px; font-weight: 700; padding: 8px 16px; border-radius: 8px;');
            console.log('%c 120+ topics · Interactive · Game-based learning ', 'color: #6b7280; font-size: 13px;');

        })();
    </script>
